<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerenciador de Bases</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/styles/login.css">
</head>

<body>
    <div class="bg-animation"></div>

    <main class="login-container" data-testid="login-container">
        <header class="login-header">
            <div style="display:inline-flex; align-items:center; gap:8px; margin-bottom:0.75rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="var(--accent-blue)" viewBox="0 0 16 16">
                    <path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h11A1.5 1.5 0 0 1 15 3.5v.5H1v-.5z"/>
                    <path d="M1 4.5h14v2a.5.5 0 0 1-.5.5h-13A.5.5 0 0 1 1 6.5v-2zm0 3h14v5a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5v-5z"/>
                </svg>
                <span style="font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-muted);">Base Manager</span>
            </div>
            <h1 class="login-title">Acesso Seguro</h1>
            <p class="login-subtitle">Entre com suas credenciais para continuar</p>
        </header>

        <form id="login-form">
            <div class="form-group">
                <label for="db-connection-string" class="form-label">Chave de Conexão do Banco de Dados
                    (Opcional)</label>
                <div class="db-connection-group">
                    <div class="form-group">
                        <input type="password" id="db-connection-string" class="form-input"
                            placeholder="postgresql://user:pass@host..." data-testid="db-connection-input">
                    </div>
                    <button type="button" id="test-db-btn" class="test-connection-btn"
                        data-testid="test-db-btn">Testar</button>
                </div>
                <div id="db-status-message" data-testid="db-status-message"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Licença de API</label>
                <div class="key-file-group">
                    <div id="key-file-badge" class="key-file-badge">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <span id="key-file-status-text">Nenhuma licença importada</span>
                    </div>
                    <button type="button" id="import-key-btn" class="test-connection-btn">Importar</button>
                </div>
            </div>

            <div class="form-group">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" id="username" class="form-input" placeholder="Digite seu usuário" required
                    autocomplete="username" data-testid="username-input">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" class="form-input" placeholder="Digite sua senha" required
                    autocomplete="current-password" data-testid="password-input">
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember-me" data-testid="remember-me-checkbox">
                    Manter-me logado
                </label>
                <a id="logout-link" data-testid="logout-link">Fazer logout?</a>
            </div>

            <button type="submit" id="login-btn" class="login-button" data-testid="login-btn" disabled>
                <span class="spinner" id="spinner"></span>
                <span id="button-text">Entrar</span>
            </button>

            <div id="message" class="error-message" data-testid="message-div"></div>
        </form>
    </main>

    <script src="src/renderer/login.js"></script>
</body>

</html>
